name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ==============================
  # Frontend / Next.js CI
  # ==============================
  frontend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prisma Generate
        run: npx prisma generate

      - name: Lint
        run: npx next lint .

      - name: Type Check
        run: npx tsc --noEmit

      - name: Run Unit Tests
        run: npm run test


  # ==============================
  # ML Service (FastAPI)
  # ==============================
  ml-service-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/ml-service

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics


  # ==============================
  # Collaboration Service (Node.js)
  # ==============================
  collaboration-service-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/collaboration-service

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npx tsc --noEmit
