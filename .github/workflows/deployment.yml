name: Deployment

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # Deploy frontend (Next.js app → "dev2" service in Railway)
      - name: Deploy Frontend
        run: railway up --detach --service dev2
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

      # Deploy ML service (create this service in Railway first)
      - name: Deploy ML Service
        continue-on-error: true
        working-directory: services/ml-service
        run: railway up --detach --service ml-service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

      # Deploy collaboration service (create this service in Railway first)
      - name: Deploy Collaboration Service
        continue-on-error: true
        working-directory: services/collaboration-service
        run: railway up --detach --service collaboration-service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
