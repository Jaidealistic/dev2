name: Deployment

on:
  push:
    branches: [main]

jobs:
  deploy-railway:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # -----------------------------
      # Deploy Frontend
      # -----------------------------
      - name: Deploy Frontend
        run: railway up --service frontend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

      # -----------------------------
      # Deploy ML Service
      # -----------------------------
      - name: Deploy ML Service
        working-directory: services/ml-service
        run: railway up --service ml-service --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

      # -----------------------------
      # Deploy Collaboration Service
      # -----------------------------
      - name: Deploy Collaboration Service
        working-directory: services/collaboration-service
        run: railway up --service collaboration-service --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
