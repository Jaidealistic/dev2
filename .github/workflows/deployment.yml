name: Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Login Railway
        run: railway login --token ${{ secrets.RAILWAY_TOKEN }}

      - name: Link Railway project
        run: railway link ${{ secrets.RAILWAY_PROJECT_ID }}

      - name: Deploy Frontend
        run: railway deploy

      - name: Deploy ML Service
        working-directory: services/ml-service
        run: railway deploy

      - name: Deploy Collaboration Service
        working-directory: services/collaboration-service
        run: railway deploy
